# Deploy the Vite frontend to GitHub Pages.
# GitHub cannot run Express or PostgreSQL — host the API + DB separately (e.g. Render + Supabase),
# then set repository secrets/variables (see DEPLOYMENT.md → GitHub Pages).

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      # npm install (not npm ci): lockfiles generated on macOS can make npm ci fail on Linux
      # with EBADPLATFORM for Rollup darwin optional binaries.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Require VITE_API_ROOT (Render API origin)
        env:
          VITE_API_ROOT: ${{ secrets.VITE_API_ROOT }}
        run: |
          if [ -z "${VITE_API_ROOT:-}" ]; then
            echo "::error::Missing Actions secret VITE_API_ROOT. Repo → Settings → Secrets and variables → Actions → New repository secret. Value: https://YOUR-SERVICE.onrender.com (no trailing slash; /api is added at runtime)."
            exit 1
          fi
          case "$VITE_API_ROOT" in
            https://*) ;;
            http://localhost*|http://127.0.0.1*) ;;
            *)
              echo "::error::VITE_API_ROOT must be https://... (your public Render URL), not a relative path."
              exit 1
              ;;
          esac

      - name: Build frontend
        env:
          VITE_API_ROOT: ${{ secrets.VITE_API_ROOT }}
          # Project Pages default: /repo-name/. User/org site at apex: set repo variable VITE_BASE_PATH to /
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ASSET_ORIGIN: ${{ vars.VITE_ASSET_ORIGIN }}
          VITE_WHATSAPP_URL: ${{ vars.VITE_WHATSAPP_URL }}
        run: npm run build -w frontend

      # GitHub Pages serves 404.html for unknown paths so React Router deep links work on refresh.
      - name: SPA fallback (404.html)
        run: cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
