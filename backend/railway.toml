# Railway picks this up when the service **Root Directory** is `backend`.
# Add Postgres from the Railway UI and link `DATABASE_URL` to this service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
releaseCommand = "npx prisma db push && npx prisma db seed"
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
